name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: PYTHONPATH=src python -W error -m unittest discover -s tests -v
      - run: ./bin/refind-forest build --output build/refind-theme
      - run: python tools/check_public_tree.py .
      - run: git diff --check
