name: Bug report
description: Report a reproducible problem with the theme or tooling
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide only sanitized information. Do not attach EFI variables, keys,
        certificates, disk identifiers, or private boot configuration.

  - type: input
    id: project-version
    attributes:
      label: Project version
      description: Release, tag, or commit identifier where the problem occurs.
    validations:
      required: true

  - type: input
    id: firmware-refind-version
    attributes:
      label: Firmware / rEFInd version
      description: Firmware vendor/version and the installed rEFInd version.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the smallest repeatable sequence that demonstrates the issue.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the result you expected.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what happened instead.
    validations:
      required: true

  - type: textarea
    id: sanitized-logs
    attributes:
      label: Sanitized logs
      description: Paste minimal logs after removing all private machine and boot data.
      render: shell
    validations:
      required: true

  - type: checkboxes
    id: privacy-confirmation
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed EFI variables, keys, certificates, disk identifiers, and private boot configuration.
          required: true
